name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production

concurrency:
  group: cloudflare-pages-${{ github.event_name == 'workflow_dispatch' && format('manual-{0}', github.event.inputs.environment) || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy (${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || (github.event_name == 'pull_request' && 'preview' || 'production') }})
    runs-on: ubuntu-latest
    env:
      DEPLOY_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || (github.event_name == 'pull_request' && 'preview' || 'production') }}
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run generate

      - name: Verify Cloudflare secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error::Missing repository secret CLOUDFLARE_API_TOKEN. Add it under Settings → Secrets and variables → Actions → Repository secrets."
            exit 1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::Missing repository secret CLOUDFLARE_ACCOUNT_ID. Add it under Settings → Secrets and variables → Actions → Repository secrets."
            exit 1
          fi

      - name: Set deployment target
        id: target
        run: |
          if [ "$DEPLOY_ENV" = "production" ]; then
            echo "wrangler_deploy=pages deploy .output/public --project-name=json-utility --commit-hash=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "wrangler_deploy=pages deploy .output/public --project-name=json-utility --branch=pr-${{ github.event.pull_request.number }} --commit-hash=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "wrangler_deploy=pages deploy .output/public --project-name=json-utility --branch=preview-${{ github.run_id }} --commit-hash=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi
        env:
          DEPLOY_ENV: ${{ env.DEPLOY_ENV }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: |
            pages project create json-utility --production-branch=main || true
            ${{ steps.target.outputs.wrangler_deploy }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
